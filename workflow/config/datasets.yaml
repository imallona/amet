## Dataset analyses for amet (crc, ecker, argelaguet).
##
## Two run modes:
##   prototype.enabled: true   small reproducible subset (proto_* keys below).
##   prototype.enabled: false  full run; per-combo cap comes from full.max_cells_per_combo.
##
## Cell downsampling per (group-stratum, plate where available) is coverage-
## ranked: file size on disk is monotonic in observed CpGs for amet's input
## formats (bismark singleC, allc, scnmt cpg_level), so largest files first.
## Argelaguet and Ecker have a `plate` column; the per-combo subset script
## plate-stratifies with round-robin top-up to avoid a single plate dominating.
## CRC has no per-cell plate metadata, so it falls back to plain top-N by size.

prototype:
  enabled: true
  cells_per_group: 10           # cap per (group, plate) combo in proto mode
  features_subset: 200          # take first N intervals of each feature BED

full:
  max_cells_per_combo: 30       # cap per per-combo stratum in full runs

barbara:
  host: barbara
  user: imallona

## Read-only data paths can be overridden to point directly at an existing
## tree on barbara, skipping any sync/symlink. Defaults below (empty strings)
## make the smk rules fall back to <results>/<dataset>/<subdir>, the local
## layout populated by sync_from_barbara.sh.

argelaguet:
  run_name: argelaguet_proto
  group_column: lineage10x
  meta_remote: /home/imallona/src/yamet/workflow/argelaguet/sample_metadata.txt
  cpg_level_remote: /home/imallona/src/yamet/workflow/argelaguet/met/cpg_level
  features_remote: /home/imallona/src/yamet/workflow/argelaguet/features/genomic_contexts
  ## Read-only path overrides. Set on barbara to point at an existing tree:
  ##   metadata_path: <data-root>/argelaguet/sample_metadata.txt
  ##   cells_dir:     <data-root>/argelaguet/met/cpg_level
  ##   features_dir:  <data-root>/argelaguet/features/genomic_contexts
  ##   mm10_dir:      <data-root>/mm10
  metadata_path: ""
  cells_dir: ""
  features_dir: ""
  mm10_dir: ""
  assembly: mm10
  window_size: 500000
  ## proto_lineages: when prototype.enabled is true, restrict the manifest
  ## step to this lineage subset (make_manifest_argelaguet.R reads it via
  ## proto_csv("argelaguet", "proto_lineages")). Comment out to keep all
  ## lineages in proto runs.
  # proto_lineages:
  #   - Epiblast
  #   - Primitive_endoderm
  #   - Nascent_mesoderm
  #   - Rostral_neurectoderm

ecker:
  run_name: ecker_proto
  group_column: sub_type
  raw_remote: /home/imallona/src/yamet/workflow/data/brain/raw
  meta_remote: /home/imallona/src/yamet/workflow/data/brain/raw/41586_2020_3182_MOESM9_ESM.xlsx
  nemo_meta_remote: /home/imallona/src/yamet/workflow/data/brain/raw/MOp_Metadata.tsv.gz
  ## Read-only path overrides. Set on barbara to:
  ##   raw_dir:        <data-root>/data/brain/raw
  ##   xlsx_path:      <data-root>/data/brain/raw/41586_2020_3182_MOESM9_ESM.xlsx
  ##   nemo_meta_path: <data-root>/data/brain/raw/MOp_Metadata.tsv.gz
  raw_dir: ""
  xlsx_path: ""
  nemo_meta_path: ""
  assembly: mm10
  window_size: 10000
  region_filter: MOp
  ## sub_type names follow the Liu 2021 supplement convention (space-separated,
  ## e.g. "IT-L23 Cux1"). Picked from the alphabetic-first slice that
  ## sync_from_barbara.sh pulls.
  ## Proto keeps only these sub_types. Uncomment / edit while
  ## prototype.enabled is true. Commented out = no sub_type filter
  ## (use the whole region).
  proto_cell_types:
    - "IT-L23 Cux1"
    - "IT-L4 Shc3"

crc:
  run_name: crc_proto
  group_column: location
  raw_remote: /home/imallona/src/yamet/workflow/data/crc/raw
  ## Read-only path overrides. Set on barbara to:
  ##   raw_dir: <data-root>/data/crc/raw
  ##   hg19_dir: <data-root>/hg19
  raw_dir: ""
  hg19_dir: ""
  assembly: hg19
  window_size: 10000
  ## Proto restricts CRC to these patients and locations. Uncomment / edit
  ## while prototype.enabled is true. Commented out = no filter (every
  ## (patient, location) combo runs).
  proto_patients:
    - CRC01
  proto_locations:
    - NC
    - PT
    - LN

amet:
  i_max_lag: 3
  min_cpgs_per_feature: 5
  ## Lower bound on cells per stratum before amet emits jsd. Proto value is
  ## permissive so sparse-stratum runs still produce JSD rows; full matches
  ## amet's own default to suppress noisy small-group estimates.
  min_cells_per_group_proto: 2
  min_cells_per_group_full: 10
  meth_call_threshold: 0.1
